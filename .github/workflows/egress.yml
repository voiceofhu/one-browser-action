name: Egress Deploy

on:
  workflow_dispatch:
    inputs:
      egress_ref:
        description: one-browser-egress branch, tag, or commit. Empty means the default branch.
        required: false
      deploy:
        description: Deploy after publishing or locating the image
        type: boolean
        required: false
        default: true
      deploy_targets:
        description: Comma-separated target IDs from egress-targets.json, or all enabled targets
        type: string
        required: false
        default: all
      rollout:
        description: Deploy only the first selected wave or continue through every selected wave
        type: choice
        required: false
        default: full
        options:
          - canary
          - full

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  EGRESS_REPOSITORY: voiceofhu/one-browser-egress
  EGRESS_IMAGE_NAME: voiceofhu/one-browser-egress

jobs:
  resolve:
    name: Resolve Egress revision
    runs-on: ubuntu-latest
    outputs:
      egress_repository: ${{ steps.refs.outputs.egress_repository }}
      egress_sha: ${{ steps.refs.outputs.egress_sha }}
      image_ref: ${{ steps.refs.outputs.image_ref }}
      image_revision_tag: ${{ steps.refs.outputs.image_revision_tag }}
      image_build_tag: ${{ steps.refs.outputs.image_build_tag }}
      deploy: ${{ steps.refs.outputs.deploy }}
      should_build: ${{ steps.plan.outputs.should_build }}
      gh_username: ${{ steps.github-identity.outputs.login }}

    steps:
      - name: Checkout workflow scripts
        uses: actions/checkout@v4
        with:
          path: action
          clean: true
          fetch-depth: 1
          persist-credentials: false

      - name: Resolve source ref
        id: refs
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          EGRESS_REPOSITORY: ${{ env.EGRESS_REPOSITORY }}
          EGRESS_REF_INPUT: ${{ inputs.egress_ref }}
          IMAGE_NAME: ${{ env.EGRESS_IMAGE_NAME }}
          DEPLOY_INPUT: ${{ inputs.deploy }}
        run: bash action/.github/scripts/resolve-egress-release.sh

      - name: Resolve GitHub token identity
        id: github-identity
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: echo "login=$(gh api user --jq .login)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ steps.github-identity.outputs.login }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Decide whether to build
        id: plan
        shell: bash
        env:
          IMAGE_REF: ${{ steps.refs.outputs.image_ref }}
          IMAGE_REVISION_TAG: ${{ steps.refs.outputs.image_revision_tag }}
        run: |
          set -Eeuo pipefail
          if bash action/.github/scripts/inspect-egress-image.sh \
            "$IMAGE_REF:$IMAGE_REVISION_TAG"; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Using existing image $IMAGE_REF:$IMAGE_REVISION_TAG"
          else
            status=$?
            if [ "$status" -ne 2 ]; then
              exit "$status"
            fi
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.suffix }} image
    needs: resolve
    if: needs.resolve.outputs.should_build == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64

    steps:
      - name: Checkout Egress
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.resolve.outputs.egress_repository }}
          ref: ${{ needs.resolve.outputs.egress_sha }}
          path: egress
          token: ${{ secrets.GH_TOKEN }}
          clean: true
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ needs.resolve.outputs.gh_username }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: egress
          file: egress/deploy/docker/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ needs.resolve.outputs.image_ref }}:${{ needs.resolve.outputs.image_build_tag }}-${{ matrix.suffix }}
          cache-from: type=gha,scope=one-browser-egress-${{ matrix.suffix }}
          cache-to: type=gha,scope=one-browser-egress-${{ matrix.suffix }},mode=max

  publish:
    name: Publish Egress manifest
    needs:
      - resolve
      - build
    if: >-
      always() &&
      !cancelled() &&
      needs.resolve.result == 'success' &&
      (needs.resolve.outputs.should_build == 'false' || needs.build.result == 'success')
    runs-on: ubuntu-latest
    outputs:
      image_pinned_ref: ${{ steps.manifest.outputs.image_pinned_ref }}
    concurrency:
      group: one-browser-egress-manifest
      cancel-in-progress: false

    steps:
      - name: Checkout workflow scripts
        uses: actions/checkout@v4
        with:
          path: action
          clean: true
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ needs.resolve.outputs.gh_username }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Publish multi-platform image
        id: manifest
        shell: bash
        env:
          IMAGE: ${{ needs.resolve.outputs.image_ref }}
          IMAGE_REVISION_TAG: ${{ needs.resolve.outputs.image_revision_tag }}
          IMAGE_BUILD_TAG: ${{ needs.resolve.outputs.image_build_tag }}
          SHOULD_BUILD: ${{ needs.resolve.outputs.should_build }}
        run: bash action/.github/scripts/publish-egress-manifests.sh

  targets:
    name: Resolve deploy targets
    needs: resolve
    if: needs.resolve.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    outputs:
      canary_matrix: ${{ steps.targets.outputs.canary_matrix }}
      canary_count: ${{ steps.targets.outputs.canary_count }}
      rollout_matrix: ${{ steps.targets.outputs.rollout_matrix }}
      rollout_count: ${{ steps.targets.outputs.rollout_count }}

    steps:
      - name: Checkout workflow configuration
        uses: actions/checkout@v4
        with:
          path: action
          clean: true
          fetch-depth: 1
          persist-credentials: false

      - name: Resolve enabled targets
        id: targets
        shell: bash
        env:
          EGRESS_TARGETS_INPUT: ${{ inputs.deploy_targets }}
          EGRESS_ROLLOUT_INPUT: ${{ inputs.rollout }}
        run: >-
          bash action/.github/scripts/resolve-egress-targets.sh
          action/.github/config/egress-targets.json

  deploy-canary:
    name: Canary ${{ matrix.target.id }}
    needs:
      - resolve
      - publish
      - targets
    if: >-
      always() &&
      !cancelled() &&
      needs.resolve.result == 'success' &&
      needs.resolve.outputs.deploy == 'true' &&
      needs.publish.result == 'success' &&
      needs.targets.result == 'success' &&
      needs.targets.outputs.canary_count != '0'
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix: ${{ fromJSON(needs.targets.outputs.canary_matrix) }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: ${{ matrix.target.environment }}
      url: https://${{ matrix.target.endpoint }}
    concurrency:
      group: one-browser-egress-${{ matrix.target.id }}-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout Egress
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.resolve.outputs.egress_repository }}
          ref: ${{ needs.resolve.outputs.egress_sha }}
          path: egress
          token: ${{ secrets.GH_TOKEN }}
          clean: true
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout deployment action
        uses: actions/checkout@v4
        with:
          path: action
          clean: true
          fetch-depth: 1
          persist-credentials: false

      - name: Deploy Egress node
        uses: ./action/.github/actions/egress
        with:
          target_json: ${{ toJSON(matrix.target) }}
          image_pinned_ref: ${{ needs.publish.outputs.image_pinned_ref }}
          deploy_ssh_key: ${{ secrets.DEPLOY_SSH_KEY }}
          deploy_known_hosts: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          gh_token: ${{ secrets.GH_TOKEN }}

  deploy-rollout:
    name: Rollout ${{ matrix.target.id }}
    needs:
      - resolve
      - publish
      - targets
      - deploy-canary
    if: >-
      always() &&
      !cancelled() &&
      needs.resolve.result == 'success' &&
      needs.resolve.outputs.deploy == 'true' &&
      needs.publish.result == 'success' &&
      needs.targets.result == 'success' &&
      needs.deploy-canary.result == 'success' &&
      needs.targets.outputs.rollout_count != '0'
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix: ${{ fromJSON(needs.targets.outputs.rollout_matrix) }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: ${{ matrix.target.environment }}
      url: https://${{ matrix.target.endpoint }}
    concurrency:
      group: one-browser-egress-${{ matrix.target.id }}-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout Egress
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.resolve.outputs.egress_repository }}
          ref: ${{ needs.resolve.outputs.egress_sha }}
          path: egress
          token: ${{ secrets.GH_TOKEN }}
          clean: true
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout deployment action
        uses: actions/checkout@v4
        with:
          path: action
          clean: true
          fetch-depth: 1
          persist-credentials: false

      - name: Deploy Egress node
        uses: ./action/.github/actions/egress
        with:
          target_json: ${{ toJSON(matrix.target) }}
          image_pinned_ref: ${{ needs.publish.outputs.image_pinned_ref }}
          deploy_ssh_key: ${{ secrets.DEPLOY_SSH_KEY }}
          deploy_known_hosts: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          gh_token: ${{ secrets.GH_TOKEN }}
