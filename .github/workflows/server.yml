name: Server Deploy

on:
  workflow_dispatch:
    inputs:
      server_repository:
        description: one-browser-server repository
        required: false
        default: voiceofhu/one-browser-server
      server_ref:
        description: one-browser-server branch, tag, or commit. Empty means the default branch.
        required: false
      version_tag:
        description: Optional image version tag. Empty publishes only SHA and latest tags.
        required: false
      web_repository:
        description: one-browser-web repository
        required: false
        default: voiceofhu/one-browser-web
      web_ref:
        description: one-browser-web branch, tag, or commit. Empty means the default branch.
        required: false
      image_name:
        description: GHCR image name without registry
        required: false
      force:
        description: Build even if the server commit image already exists
        type: boolean
        required: false
        default: false
      deploy:
        description: Deploy after publishing the image
        type: boolean
        required: false
        default: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  WEB_WORKDIR: .frontend-build/one-browser-web
  WEB_BUILD_SCRIPT: build
  VITE_API_URL: /api
  VITE_BASE_URL: /
  PNPM_VERSION: 10.25.0

jobs:
  resolve:
    name: Resolve server revision
    runs-on: ubuntu-latest
    outputs:
      server_repository: ${{ steps.refs.outputs.server_repository }}
      server_ref: ${{ steps.refs.outputs.server_ref }}
      server_sha: ${{ steps.refs.outputs.server_sha }}
      server_tag: ${{ steps.refs.outputs.server_tag }}
      web_repository: ${{ steps.refs.outputs.web_repository }}
      web_ref: ${{ steps.refs.outputs.web_ref }}
      web_sha: ${{ steps.refs.outputs.web_sha }}
      image_name: ${{ steps.refs.outputs.image_name }}
      image_ref: ${{ steps.refs.outputs.image_ref }}
      image_revision_tag: ${{ steps.refs.outputs.image_revision_tag }}
      force: ${{ steps.refs.outputs.force }}
      deploy: ${{ steps.refs.outputs.deploy }}
      should_build: ${{ steps.plan.outputs.should_build }}

    steps:
      - name: Resolve refs
        id: refs
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.ONE_BROWSER_ACTION_TOKEN || github.token }}
          SERVER_REPOSITORY_INPUT: ${{ inputs.server_repository }}
          SERVER_REF_INPUT: ${{ inputs.server_ref }}
          VERSION_TAG_INPUT: ${{ inputs.version_tag }}
          WEB_REPOSITORY_INPUT: ${{ inputs.web_repository }}
          WEB_REF_INPUT: ${{ inputs.web_ref }}
          IMAGE_NAME_INPUT: ${{ inputs.image_name }}
          FORCE_INPUT: ${{ inputs.force }}
          DEPLOY_INPUT: ${{ inputs.deploy }}
        run: |
          set -euo pipefail

          server_repository="${SERVER_REPOSITORY_INPUT:-voiceofhu/one-browser-server}"
          server_ref="${SERVER_REF_INPUT:-}"
          web_repository="${WEB_REPOSITORY_INPUT:-voiceofhu/one-browser-web}"
          web_ref="${WEB_REF_INPUT:-}"
          image_name="${IMAGE_NAME_INPUT:-$server_repository}"
          image_name="${image_name,,}"
          force="${FORCE_INPUT:-false}"
          deploy="${DEPLOY_INPUT:-true}"

          if [ -z "$server_ref" ]; then
            server_ref="$(gh api "repos/$server_repository" --jq .default_branch)"
          fi
          if [ -z "$web_ref" ]; then
            web_ref="$(gh api "repos/$web_repository" --jq .default_branch)"
          fi

          server_sha="$(gh api "repos/$server_repository/commits/$server_ref" --jq .sha)"
          web_sha="$(gh api "repos/$web_repository/commits/$web_ref" --jq .sha)"
          image_revision_tag="sha-$server_sha-web-$web_sha"
          server_tag="${VERSION_TAG_INPUT:-}"
          if [ -n "$server_tag" ] && [[ "$server_tag" != v* ]]; then
            server_tag="v$server_tag"
          fi

          case "$force" in
            true|1|yes) force=true ;;
            *) force=false ;;
          esac
          case "$deploy" in
            true|1|yes) deploy=true ;;
            *) deploy=false ;;
          esac

          if [ "$deploy" = "true" ]; then
            if [ "$server_repository" != "voiceofhu/one-browser-server" ] ||
               [ "$web_repository" != "voiceofhu/one-browser-web" ] ||
               [ "$image_name" != "voiceofhu/one-browser-server" ]; then
              echo "Production deploy only accepts the trusted One Browser repositories and image." >&2
              exit 1
            fi
          fi

          {
            echo "server_repository=$server_repository"
            echo "server_ref=$server_ref"
            echo "server_sha=$server_sha"
            echo "server_tag=$server_tag"
            echo "web_repository=$web_repository"
            echo "web_ref=$web_ref"
            echo "web_sha=$web_sha"
            echo "image_name=$image_name"
            echo "image_ref=$REGISTRY/$image_name"
            echo "image_revision_tag=$image_revision_tag"
            echo "force=$force"
            echo "deploy=$deploy"
          } >> "$GITHUB_OUTPUT"

          printf 'server %s -> %s\n' "$server_ref" "$server_sha"
          printf 'web    %s -> %s\n' "$web_ref" "$web_sha"
          printf 'image  %s\n' "$image_revision_tag"
          printf 'tag    %s\n' "${server_tag:-none}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.ONE_BROWSER_ACTION_TOKEN || github.token }}

      - name: Decide whether to build
        id: plan
        shell: bash
        env:
          FORCE: ${{ steps.refs.outputs.force }}
          IMAGE_REF: ${{ steps.refs.outputs.image_ref }}
          IMAGE_REVISION_TAG: ${{ steps.refs.outputs.image_revision_tag }}
          SERVER_TAG: ${{ steps.refs.outputs.server_tag }}
        run: |
          set -euo pipefail

          if docker buildx imagetools inspect "$IMAGE_REF:$IMAGE_REVISION_TAG" >/dev/null 2>&1; then
            image_exists=1
          else
            image_exists=0
          fi

          tag_exists=1
          if [ -n "$SERVER_TAG" ] &&
             ! docker buildx imagetools inspect "$IMAGE_REF:$SERVER_TAG" >/dev/null 2>&1; then
            tag_exists=0
          fi

          if [ "$image_exists" = "1" ] && [ "$tag_exists" = "1" ] && [ "${FORCE:-false}" != "true" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Image $IMAGE_REF:$IMAGE_REVISION_TAG already exists; skipping build."
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  frontend:
    name: Build web dist
    needs: resolve
    if: needs.resolve.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout server
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.resolve.outputs.server_repository }}
          ref: ${{ needs.resolve.outputs.server_sha }}
          path: server
          token: ${{ secrets.ONE_BROWSER_ACTION_TOKEN || github.token }}
          clean: true
          fetch-depth: 1

      - name: Checkout web
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.resolve.outputs.web_repository }}
          ref: ${{ needs.resolve.outputs.web_sha }}
          path: server/${{ env.WEB_WORKDIR }}
          token: ${{ secrets.ONE_BROWSER_ACTION_TOKEN || github.token }}
          clean: true
          fetch-depth: 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate

      - name: Build frontend dist
        shell: bash
        working-directory: server
        env:
          WEB_WORKDIR: ${{ env.WEB_WORKDIR }}
          WEB_BUILD_SCRIPT: ${{ env.WEB_BUILD_SCRIPT }}
          VITE_API_URL: ${{ env.VITE_API_URL }}
          VITE_BASE_URL: ${{ env.VITE_BASE_URL }}
        run: bash .github/scripts/build-frontend-dist.sh

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: server/dist
          if-no-files-found: error
          retention-days: 1

  build:
    name: Build ${{ matrix.suffix }} image
    needs:
      - resolve
      - frontend
    if: needs.resolve.outputs.should_build == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64

    steps:
      - name: Checkout server
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.resolve.outputs.server_repository }}
          ref: ${{ needs.resolve.outputs.server_sha }}
          path: server
          token: ${{ secrets.ONE_BROWSER_ACTION_TOKEN || github.token }}
          clean: true
          fetch-depth: 1

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: server/dist

      - name: Prepare Docker tags
        id: docker-tags
        shell: bash
        env:
          IMAGE: ${{ needs.resolve.outputs.image_ref }}
          IMAGE_REVISION_TAG: ${{ needs.resolve.outputs.image_revision_tag }}
          SERVER_TAG: ${{ needs.resolve.outputs.server_tag }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          {
            echo 'tags<<EOF'
            printf '%s\n' "$IMAGE:$IMAGE_REVISION_TAG-$SUFFIX"
            if [ -n "$SERVER_TAG" ]; then
              printf '%s\n' "$IMAGE:$SERVER_TAG-$SUFFIX"
            fi
            printf '%s\n' "$IMAGE:latest-$SUFFIX"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.ONE_BROWSER_ACTION_TOKEN || github.token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: server
          file: server/deploy/docker/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.docker-tags.outputs.tags }}
          build-args: |
            RUST_IMAGE=public.ecr.aws/docker/library/rust:1-slim-bookworm
            RUNTIME_IMAGE=public.ecr.aws/docker/library/debian:bookworm-slim
            BUILD_APP_ENV=production
            ONE_BROWSER_GIT_SHA=${{ needs.resolve.outputs.server_sha }}
            GIT_COMMIT=${{ needs.resolve.outputs.server_sha }}
            ONE_BROWSER_RUSTC_VERSION=
          cache-from: type=gha,scope=one-browser-server-${{ matrix.suffix }}
          cache-to: type=gha,scope=one-browser-server-${{ matrix.suffix }},mode=max

  manifest:
    name: Publish multi-platform manifest
    needs:
      - resolve
      - build
    if: needs.resolve.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.ONE_BROWSER_ACTION_TOKEN || github.token }}

      - name: Create manifest tags
        shell: bash
        env:
          IMAGE: ${{ needs.resolve.outputs.image_ref }}
          IMAGE_REVISION_TAG: ${{ needs.resolve.outputs.image_revision_tag }}
          SERVER_TAG: ${{ needs.resolve.outputs.server_tag }}
        run: |
          docker buildx imagetools create \
            -t "$IMAGE:$IMAGE_REVISION_TAG" \
            "$IMAGE:$IMAGE_REVISION_TAG-amd64" \
            "$IMAGE:$IMAGE_REVISION_TAG-arm64"

          if [ -n "$SERVER_TAG" ]; then
            docker buildx imagetools create \
              -t "$IMAGE:$SERVER_TAG" \
              "$IMAGE:$SERVER_TAG-amd64" \
              "$IMAGE:$SERVER_TAG-arm64"
          fi

          docker buildx imagetools create \
            -t "$IMAGE:latest" \
            "$IMAGE:latest-amd64" \
            "$IMAGE:latest-arm64"

  deploy:
    name: Deploy server
    needs:
      - resolve
      - manifest
    if: >-
      always() &&
      !cancelled() &&
      needs.resolve.result == 'success' &&
      needs.resolve.outputs.deploy == 'true' &&
      (needs.resolve.outputs.should_build == 'false' || needs.manifest.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: one-browser-production-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout server
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.resolve.outputs.server_repository }}
          ref: ${{ needs.resolve.outputs.server_sha }}
          path: server
          token: ${{ secrets.ONE_BROWSER_ACTION_TOKEN || github.token }}
          clean: true
          fetch-depth: 1

      - name: Prepare deployment image
        id: deploy-image
        shell: bash
        env:
          IMAGE: ${{ needs.resolve.outputs.image_ref }}
          IMAGE_REVISION_TAG: ${{ needs.resolve.outputs.image_revision_tag }}
        run: |
          echo "image=$IMAGE:$IMAGE_REVISION_TAG" >> "$GITHUB_OUTPUT"

      - name: Validate deployment secrets
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          missing=0
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_KNOWN_HOSTS; do
            if [ -z "$(eval "printf '%s' \"\$$name\"")" ]; then
              echo "$name is required" >&2
              missing=1
            fi
          done
          exit "$missing"

      - name: Configure SSH
        shell: bash
        working-directory: server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: bash .github/scripts/configure-ssh.sh

      - name: Deploy image with Docker Compose
        shell: bash
        working-directory: server
        env:
          SSH_HOST: one-browser-deploy
          REMOTE_DIR: ${{ secrets.DEPLOY_REMOTE_DIR || '/opt/one-browser' }}
          DOCKER_IMAGE: ${{ steps.deploy-image.outputs.image }}
          COMPOSE_PROJECT_NAME: ${{ vars.DEPLOY_COMPOSE_PROJECT_NAME || 'one-browser' }}
          COMPOSE_SERVICE_NAME: ${{ vars.DEPLOY_COMPOSE_SERVICE_NAME || 'server' }}
          CONTAINER_NAME: ${{ vars.DEPLOY_CONTAINER_NAME || 'one-browser-server' }}
          DOCKER_NETWORK: ${{ vars.DEPLOY_DOCKER_NETWORK || 'db-networks' }}
          DOCKER_NETWORK_EXTERNAL: ${{ vars.DEPLOY_DOCKER_NETWORK_EXTERNAL || 'true' }}
          POSTGRES_HOST: ${{ vars.DEPLOY_POSTGRES_HOST || 'postgres' }}
          REDIS_HOST: ${{ vars.DEPLOY_REDIS_HOST || 'redis' }}
          USE_SUDO: ${{ vars.DEPLOY_USE_SUDO || '0' }}
          PULL_IMAGE: "1"
          RUN_HEALTHCHECK: "1"
          SHOW_LOGS: "1"
          LOG_TAIL: ${{ vars.DEPLOY_LOG_TAIL || '120' }}
          LOG_FOLLOW_SECONDS: ${{ vars.DEPLOY_LOG_FOLLOW_SECONDS || '5' }}
        run: bash .github/scripts/deploy-docker-compose.sh

      - name: Verify Egress TLS endpoint
        if: ${{ vars.DEPLOY_EGRESS_CHECK != 'false' }}
        shell: bash
        env:
          EGRESS_ENDPOINT: ${{ vars.DEPLOY_EGRESS_ENDPOINT || 'egress.aicbe.com:443' }}
        run: |
          set -euo pipefail

          if [[ ! "$EGRESS_ENDPOINT" =~ ^([A-Za-z0-9.-]+):([0-9]+)$ ]]; then
            echo "DEPLOY_EGRESS_ENDPOINT must use host:port format" >&2
            exit 1
          fi
          host="${BASH_REMATCH[1]}"

          tls_output="$(
            timeout 20s openssl s_client \
              -connect "$EGRESS_ENDPOINT" \
              -servername "$host" \
              -alpn h2 \
              -verify_hostname "$host" \
              -verify_return_error \
              </dev/null 2>&1 || true
          )"

          if ! grep -Fq 'ALPN protocol: h2' <<<"$tls_output" ||
             ! grep -Fq 'Verify return code: 0 (ok)' <<<"$tls_output"; then
            printf '%s\n' "$tls_output" >&2
            echo "Egress TLS verification failed for $EGRESS_ENDPOINT" >&2
            exit 1
          fi

          echo "Egress TLS verified: $EGRESS_ENDPOINT (ALPN h2)"
